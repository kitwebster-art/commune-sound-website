<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Commune Sound Future Dates QR</title>
    <link rel="icon" href="assets/commune-logo.png" type="image/png">
    <style>
      :root {
        --ink: #050505;
        --cream: #f1e7d7;
        --muted: rgba(241, 231, 215, 0.74);
        --orange: #ff6c22;
        --pink: #f03b87;
        --cyan: #62d3df;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        color: var(--cream);
        background: var(--ink);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        width: 210mm;
        min-height: 297mm;
        display: grid;
        place-items: center;
        padding: 22mm;
        margin: 0 auto;
        background:
          radial-gradient(circle at 16% 12%, rgba(255, 108, 34, 0.22), transparent 30%),
          radial-gradient(circle at 88% 82%, rgba(98, 211, 223, 0.18), transparent 34%),
          #050505;
      }

      section {
        width: 100%;
        display: grid;
        justify-items: center;
        text-align: center;
      }

      p,
      h1 {
        margin-top: 0;
      }

      .kicker {
        margin-bottom: 14px;
        color: var(--muted);
        font-size: 18px;
        font-weight: 950;
        text-transform: uppercase;
      }

      h1 {
        max-width: 8ch;
        margin-bottom: 20px;
        font-family: "Arial Narrow", "Helvetica Neue Condensed", Impact, sans-serif;
        font-size: 82px;
        line-height: 0.86;
        text-transform: uppercase;
      }

      .line {
        max-width: 570px;
        margin-bottom: 34px;
        color: var(--muted);
        font-size: 25px;
        line-height: 1.16;
        font-weight: 800;
      }

      img {
        width: 118mm;
        height: 118mm;
        padding: 7mm;
        background: var(--cream);
      }

      .url {
        margin-top: 24px;
        font-size: 18px;
        font-weight: 900;
      }

      @media print {
        body {
          background: #050505;
        }

        main {
          margin: 0;
          break-inside: avoid;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <section>
        <p class="kicker">Future dates</p>
        <h1>Join Commune Sound</h1>
        <p class="line">Scan for the next date, early ticket links and occasional music notes.</p>
        <img src="assets/commune-sound-future-dates-qr.png" alt="QR code linking to Commune Sound future dates signup">
        <p class="url">communesound.com.au</p>
      </section>
    </main>
  </body>
</html>
