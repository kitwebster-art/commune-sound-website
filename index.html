<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Commune Sound | Sober Rave Melbourne</title>
    <meta
      name="description"
      content="Commune Sound is a sober rave in Melbourne. Join the list for first ticket links, future dates and music notes."
    >
    <meta property="og:title" content="Commune Sound">
    <meta property="og:description" content="A sober rave in Melbourne. Join the list for first ticket links, future dates and music notes.">
    <meta property="og:image" content="assets/commune-wordmark-cropped.jpeg">
    <link rel="icon" href="assets/commune-logo.png" type="image/png">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <header class="site-header" aria-label="Site navigation">
      <a class="brand" href="#top" aria-label="Commune Sound home">
        <img src="assets/commune-logo.png" alt="">
        <span>Commune Sound</span>
      </a>
      <nav>
        <a href="#join">Join list</a>
        <a href="#venue">Venue</a>
      </nav>
    </header>

    <main id="top">
      <section class="wordmark-banner" aria-label="Commune Sound">
        <h1 class="sr-only">Commune Sound</h1>
        <img src="assets/commune-wordmark-cropped.jpeg" alt="Commune Sound">
      </section>

      <section class="hero" aria-label="Commune Sound positioning">
        <p class="lede">Sober Rave</p>
      </section>

      <section id="venue" class="venue-photo" aria-label="St Brigid's Hall">
        <img src="assets/st-brigids-red-hall.jpg" alt="St Brigid's Hall lit red for Commune Sound">
      </section>

      <section id="join" class="join-section" aria-label="Join Commune Sound future dates list">
        <div class="join-copy">
          <h2>Join Commune Sound</h2>
          <p>
            Get first ticket links, future dates and occasional music notes.
          </p>
        </div>

        <form
          class="signup-form"
          action="https://kitwebster.us2.list-manage.com/subscribe/post?u=2ffca6b3b50c609d67f7c8e4a&amp;id=1b5918783a&amp;f_id=0048c7e3f0"
          method="post"
        >
          <input type="hidden" name="EMAILTYPE" value="html">
          <input type="hidden" name="mc_signupsource" value="commune_sound_website">
          <label>
            <span>First name</span>
            <input type="text" name="FNAME" autocomplete="given-name">
          </label>
          <label>
            <span>Email</span>
            <input type="email" name="EMAIL" autocomplete="email" required>
          </label>
          <div class="mailchimp-honeypot" aria-hidden="true">
            <input type="text" name="b_2ffca6b3b50c609d67f7c8e4a_1b5918783a" tabindex="-1" value="">
          </div>
          <button class="button primary" type="submit">Join list</button>
          <p>Future Commune Sound updates only. Unsubscribe anytime.</p>
        </form>
      </section>
    </main>

    <footer>
      <p>Commune Sound</p>
      <div>
        <a href="#join">Join list</a>
        <a href="https://www.facebook.com/groups/1028019719567612">Facebook group</a>
      </div>
    </footer>
  </body>
</html>
